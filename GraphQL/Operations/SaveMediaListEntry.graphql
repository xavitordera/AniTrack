mutation SaveMediaListEntry(
  $id: Int
  $mediaId: Int
  $status: MediaListStatus
  $score: Float
  $progress: Int
  $startedAt: FuzzyDateInput
  $completedAt: FuzzyDateInput
) {
  saved: SaveMediaListEntry(
    id: $id
    mediaId: $mediaId
    status: $status
    score: $score
    progress: $progress
    startedAt: $startedAt
    completedAt: $completedAt
  ) {
    id
    status
    score
    progress
    startedAt {
      year
      month
      day
    }
    completedAt {
      year
      month
      day
    }
    media {
      id
      episodes
      title {
        romaji
        english
        userPreferred
      }
      coverImage {
        large
        extraLarge
      }
    }
  }
}
